    body {

      color: #2c2416;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #160f08;
      color: #f4efe5;
      padding: 2.8rem 2rem 2.2rem;
      text-align: center;
      border-bottom: 3px solid #c0832a;
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        -50deg, transparent, transparent 36px,
        rgba(192,131,42,0.05) 36px, rgba(192,131,42,0.05) 72px
      );
      pointer-events: none;
    }
    .header-label {
      font-size: 0.68rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: #c0832a;
      margin-bottom: 0.6rem;
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.7rem, 5vw, 2.8rem);
      font-weight: 700;
      line-height: 1.1;
      position: relative;
    }
    .subtitle {
      margin-top: 0.6rem;
      font-size: 0.87rem;
      color: #a08060;
      font-style: italic;
    }

    /* ── Stat bar ── */
    .stat-bar {
      display: flex;
      justify-content: center;
      gap: 2rem;
      flex-wrap: wrap;
      padding: 1.1rem 2rem;
      background: #1f1409;
      border-bottom: 2px solid #2e1c08;
    }
    .stat { text-align: center; }
    .stat-num {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: #c0832a;
      display: block;
    }
    .stat-label {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #6a5030;
    }

    /* ── Filter ── */
    .filter-bar {
      display: flex;
      gap: 0.45rem;
      flex-wrap: wrap;
      justify-content: center;
      padding: 1.2rem 1rem;
      background: #ede7d9;
      border-bottom: 1px solid #d0c8b0;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .filter-btn {
      padding: 0.3rem 0.85rem;
      border: 1.5px solid currentColor;
      border-radius: 2rem;
      cursor: pointer;
      font-family: 'Source Serif 4', serif;
      font-size: 0.75rem;
      background: transparent;
      transition: all 0.15s;
      font-weight: 600;
    }
    .filter-btn:hover { opacity: 0.65; }
    .filter-btn.active {
      color: #f4efe5 !important;
      background: #160f08 !important;
      border-color: #160f08 !important;
    }

    /* ── Timeline ── */
    .timeline-wrap {
      max-width: 880px;
      margin: 0 auto;
      padding: 3rem 1.5rem 4rem;
      position: relative;
    }
    .spine {
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      width: 2px;
      background: linear-gradient(to bottom, transparent, #c0832a 4%, #c0832a 96%, transparent);
      transform: translateX(-50%);
    }
    @media (max-width: 620px) {
      .spine { left: 1.1rem; transform: none; }
    }

    /* ── Year group ── */
    .year-group { margin-bottom: 2.8rem; }
    .year-marker {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.3rem;
      position: relative;
      z-index: 2;
    }
    .year-pill {
      background: #160f08;
      color: #c0832a;
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      padding: 0.28rem 1rem;
      border-radius: 2rem;
      border: 2px solid #c0832a;
      letter-spacing: 0.06em;
    }

    /* ── Event rows ── */
    .events-in-year { display: flex; flex-direction: column; gap: 0.9rem; }

    .event-row { display: flex; align-items: flex-start; }
    .event-row:nth-child(odd)  { flex-direction: row; }
    .event-row:nth-child(even) { flex-direction: row-reverse; }
    @media (max-width: 620px) {
      .event-row,
      .event-row:nth-child(even) { flex-direction: row; }
    }

    .event-spacer { flex: 1; min-width: 0; }

    .event-dot-col {
      width: 2.2rem;
      display: flex;
      justify-content: center;
      flex-shrink: 0;
      padding-top: 0.75rem;
    }
    .event-dot {
      width: 0.9rem;
      height: 0.9rem;
      border-radius: 50%;
      border: 2.5px solid #f4efe5;
      flex-shrink: 0;
      transition: transform 0.15s;
    }
    .event-row:hover .event-dot { transform: scale(1.25); }

    /* ── Card ── */
    .event-card {
      flex: 1;
      min-width: 0;
      max-width: calc(50% - 1.1rem);
      border-radius: 7px;
      padding: 0.85rem 1rem 0.8rem;
      border-left: 3.5px solid;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      user-select: none;
    }
    .event-row:nth-child(even) .event-card {
      border-left: none;
      border-right: 3.5px solid;
    }
    @media (max-width: 620px) {
      .event-card { max-width: calc(100% - 2.2rem); }
      .event-row:nth-child(even) .event-card {
        border-left: 3.5px solid;
        border-right: none;
      }
    }
    .event-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 22px rgba(0,0,0,0.11);
    }

    .card-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 0.4rem; }
    .card-icon { font-size: 1rem; opacity: 0.55; flex-shrink: 0; margin-top: 0.05rem; }

    .card-kategori {
      font-size: 0.63rem;

      font-weight: 700;
      margin-bottom: 0.25rem;

      margin-bottom: 0.28rem;
    }

      font-size: 0.7rem;

      margin-bottom: 0.35rem;
    }
    .card-toggle-hint {
      font-size: 0.7rem;
      opacity: 0.4;
      font-style: italic;
    }

    /* Expanded body */
    .card-body {
      margin-top: 0.55rem;

      padding-top: 0.55rem;
      display: none;
    }
    .event-card.open .card-body       { display: block; }
    .event-card.open .card-toggle-hint { display: none; }

      text-transform: uppercase;

      opacity: 0.5;
      margin-bottom: 0.3rem;
      color: #2c2416;
    }
    .sumber-list { display: flex; flex-direction: column; gap: 0.28rem; }
    .sumber-link {

      align-items: center;
      gap: 0.4rem;
      font-size: 0.73rem;
      text-decoration: none;
      font-weight: 600;
      padding: 0.28rem 0.55rem;
      border-radius: 4px;

      transition: background 0.12s;

    .sumber-link:hover { background: rgba(0,0,0,0.12); }

    /* ── Legend ── */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.65rem 1.4rem;
      justify-content: center;
      padding: 1.2rem 1rem;
      border-top: 1px solid #d0c8b0;

    .legend-item {

    }

      border-radius: 50%;

    }

    footer {
      text-align: center;
      padding: 1.4rem;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      background: #160f08;
      color: #5a4030;
    }

    .empty {
      text-align: center;
      padding: 3rem;
      opacity: 0.35;
      font-style: italic;
    }
  </style>
</head>

        ]
      }

    const kategoriConfig = {
      "Bencana Alam":      { color: "#c0622a", icon: "⛰️",  bg: "#fff6f0" },
      "Bencana Ekologis":  { color: "#b52b2b", icon: "🔥",  bg: "#fff2f0" },
      "Alih Fungsi Lahan": { color: "#2e7d48", icon: "🌿",  bg: "#f0faf3" },
      "Kriminal":          { color: "#7b35a8", icon: "⚠️",  bg: "#f8f0ff" },
      "Seremonial":        { color: "#1a6fa8", icon: "🏛️", bg: "#f0f6ff" },
    };

    let selectedKategori = "Semua";

    function getDomain(url) {
      try { return new URL(url).hostname.replace("www.", ""); }
      catch { return url; }
    }

    function esc(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function renderStats() {
      const totalSumber = events.reduce((s, e) => s + e.sumber.length, 0);
      const bencana = events.filter(e => e.kategori.includes("Bencana")).length;
      const alih    = events.filter(e => e.kategori === "Alih Fungsi Lahan").length;
      document.getElementById("stat-bar").innerHTML = `
        <div class="stat"><span class="stat-num">${events.length}</span><span class="stat-label">Total Peristiwa</span></div>
        <div class="stat"><span class="stat-num">${bencana}</span><span class="stat-label">Bencana</span></div>
        <div class="stat"><span class="stat-num">${alih}</span><span class="stat-label">Alih Fungsi Lahan</span></div>
        <div class="stat"><span class="stat-num">${totalSumber}</span><span class="stat-label">Sumber</span></div>
      `;
    }

    function renderFilters() {
      const bar = document.getElementById("filter-bar");
      const cats = ["Semua", ...Object.keys(kategoriConfig)];
      bar.innerHTML = cats.map(k => {
        const cfg   = kategoriConfig[k];
        const color = cfg ? cfg.color : "#2c2416";
        const icon  = cfg ? cfg.icon + " " : "";
        const active = k === selectedKategori ? "active" : "";
        return `<button class="filter-btn ${active}" data-k="${esc(k)}"
          style="color:${color}; border-color:${color}">${icon}${esc(k)}</button>`;
      }).join("");

      bar.querySelectorAll(".filter-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          selectedKategori = btn.dataset.k;
          renderFilters();
          renderTimeline();
        });
      });
    }

    function renderTimeline() {
      const filtered = selectedKategori === "Semua"
        ? events
        : events.filter(e => e.kategori === selectedKategori);

      const grouped = {};
      filtered.forEach(e => {
        if (!grouped[e.tahun]) grouped[e.tahun] = [];
        grouped[e.tahun].push(e);
      });
      const years = Object.keys(grouped).sort((a, b) => a - b);

      const container = document.getElementById("timeline-content");

      if (years.length === 0) {
        container.innerHTML = `<div class="empty">Tidak ada data untuk kategori ini.</div>`;
        return;
      }

      container.innerHTML = years.map(year => {
        const rows = grouped[year].map((ev, i) => {
          const cfg = kategoriConfig[ev.kategori] || { color: "#888", icon: "•", bg: "#f0f0f0" };

          const sumberLinks = ev.sumber.map(s => `
            <a class="sumber-link" href="${esc(s.url)}" target="_blank" rel="noopener noreferrer"
               style="color:${cfg.color}" data-stop>
              <span class="sumber-icon">🔗</span>
              <span class="sumber-label-text">${esc(s.label)}<span class="sumber-domain"> — ${esc(getDomain(s.url))}</span></span>
              <span class="sumber-arrow">↗</span>
            </a>`).join("");

          return `
            <div class="event-row">
              <div class="event-spacer"></div>
              <div class="event-dot-col">
                <div class="event-dot" style="background:${cfg.color}; box-shadow:0 0 0 2px ${cfg.color}"></div>
              </div>
              <div class="event-card"
                   style="background:${cfg.bg}; border-color:${cfg.color}; color:#2c2416"
                   role="button" tabindex="0" aria-expanded="false">
                <div class="card-head">
                  <div>
                    <div class="card-kategori" style="color:${cfg.color}">${esc(ev.kategori)}</div>
                    <div class="card-title">${esc(ev.peristiwa)}</div>
                    <div class="card-lokasi">📍 ${esc(ev.lokasi)}</div>
                  </div>
                  <div class="card-icon">${cfg.icon}</div>
                </div>
                <div class="card-toggle-hint">Klik untuk detail &amp; sumber ↓</div>
                <div class="card-body">
                  <div class="card-desc">${esc(ev.keterangan)}</div>
                  <div class="sumber-label">Sumber</div>
                  <div class="sumber-list">${sumberLinks}</div>
                </div>
              </div>
            </div>`;
        }).join("");

        return `
          <div class="year-group">
            <div class="year-marker"><span class="year-pill">${year}</span></div>
            <div class="events-in-year">${rows}</div>
          </div>`;
      }).join("");

      container.querySelectorAll(".event-card").forEach(card => {
        card.addEventListener("click", e => {
          if (e.target.closest("[data-stop]")) return;
          card.classList.toggle("open");
          card.setAttribute("aria-expanded", card.classList.contains("open"));
        });
        card.addEventListener("keydown", e => {
          if (e.key === "Enter") card.click();
        });
      });
    }

    function renderLegend() {
      document.getElementById("legend").innerHTML =
        Object.entries(kategoriConfig).map(([k, cfg]) => `
          <div class="legend-item">
            <div class="legend-dot" style="background:${cfg.color}"></div>
            <span style="color:${cfg.color}">${cfg.icon} ${esc(k)}</span>
          </div>`).join("");
    }

    renderStats();
    renderFilters();
    renderTimeline();
    renderLegend();
  </script>
</body>
</html>
