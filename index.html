        peristiwa: "Protes Warga atas Bangunan Beton di TWA Panelokan",
        kategori: "Alih Fungsi Lahan",
        lokasi: "TWA Kedisan",
        keterangan: "Pendataan BKSDA: kompleks wisata terdiri dari restoran, toilet, dapur, taman, dan area parkir. Warga meminta bangunan dibongkar karena area rawan banjir.",
        sumber: [
          { label: "Mongabay Indonesia", url: "https://mongabay.co.id/2025/10/19/warga-protes-bangunan-wisata-di-hutan-konservasi-bali/" }
        ]
      },
      {
        tahun: 2026,
        peristiwa: "Maraknya Izin Pembangunan di Kawasan Geopark Kintamani",
        kategori: "Alih Fungsi Lahan",
        lokasi: "Geopark Kintamani",
        keterangan: "Adanya dugaan praktik mafia tanah dan alih fungsi lahan di kawasan Geopark Kintamani yang mengancam warisan geologi.",
        sumber: [
          { label: "Media Indonesia News", url: "https://m.mediaindonesianews.com/main/hukum-dan-kriminal/18711/warisan-geologi-kintamani-terancam-praktisi-hukum-soroti-dugaan-mafia-tanah-di-kawasan-geopark" }
        ]
      },
      {
        tahun: 2026,
        peristiwa: "Warga Kintamani Tertimbun Longsor",
        kategori: "Bencana Alam",
        lokasi: "Banjar Belong",
        keterangan: "Tebing tempat kejadian merupakan wilayah berbukit yang berpotensi rawan longsor, terutama di area pengerjaan bambu. Korban ditemukan meninggal.",
        sumber: [
          { label: "Liputan 6", url: "https://www.liputan6.com/regional/read/6278961/warga-kintamani-tertimbun-longsor-saat-cari-bambu-ditemukan-meninggal" }
        ]
      }
    ];

    /* icon key per kategori */
    const kategoriConfig = {
      "Bencana Alam":      { color: "#c0622a", iconKey: "mountain", bg: "#fff6f0" },
      "Bencana Ekologis":  { color: "#b52b2b", iconKey: "flame",    bg: "#fff2f0" },
      "Alih Fungsi Lahan": { color: "#2e7d48", iconKey: "leaf",     bg: "#f0faf3" },
      "Kriminal":          { color: "#7b35a8", iconKey: "alert",    bg: "#f8f0ff" },
      "Seremonial":        { color: "#1a6fa8", iconKey: "landmark", bg: "#f0f6ff" },
    };

    /* colour SVG stroke on the fly */
    function icon(key, color) {
      return ICONS[key].replace('stroke="currentColor"', `stroke="${color}"`);
    }

    let selectedKategori = "Semua";

    function getDomain(url) {
      try { return new URL(url).hostname.replace("www.", ""); }
      catch { return url; }
    }

    function esc(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    /* ── Stat bar ── */
    function renderStats() {
      const totalSumber = events.reduce((s, e) => s + e.sumber.length, 0);
      const bencana = events.filter(e => e.kategori.includes("Bencana")).length;
      const alih    = events.filter(e => e.kategori === "Alih Fungsi Lahan").length;
      document.getElementById("stat-bar").innerHTML = `
        <div class="stat"><span class="stat-num">${events.length}</span><span class="stat-label">Total Peristiwa</span></div>
        <div class="stat"><span class="stat-num">${bencana}</span><span class="stat-label">Bencana</span></div>
        <div class="stat"><span class="stat-num">${alih}</span><span class="stat-label">Alih Fungsi Lahan</span></div>
        <div class="stat"><span class="stat-num">${totalSumber}</span><span class="stat-label">Sumber</span></div>
      `;
    }

    /* ── Filter bar ── */
    function renderFilters() {
      const bar  = document.getElementById("filter-bar");
      const cats = ["Semua", ...Object.keys(kategoriConfig)];
      bar.innerHTML = cats.map(k => {
        const cfg    = kategoriConfig[k];
        const color  = cfg ? cfg.color : "#2c2416";
        const active = k === selectedKategori ? "active" : "";
        const svg    = cfg
          ? icon(cfg.iconKey, active ? "#f4efe5" : color)
          : icon("grid", active ? "#f4efe5" : "#2c2416");
        return `<button class="filter-btn ${active}" data-k="${esc(k)}"
          style="color:${color}; border-color:${color}">${svg}${esc(k)}</button>`;
      }).join("");

      bar.querySelectorAll(".filter-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          selectedKategori = btn.dataset.k;
          renderFilters();
          renderTimeline();
        });
      });
    }

    /* ── Timeline ── */
    function renderTimeline() {
      const filtered = selectedKategori === "Semua"
        ? events
        : events.filter(e => e.kategori === selectedKategori);

      const grouped = {};
      filtered.forEach(e => {
        if (!grouped[e.tahun]) grouped[e.tahun] = [];
        grouped[e.tahun].push(e);
      });
      const years = Object.keys(grouped).sort((a, b) => a - b);

      const container = document.getElementById("timeline-content");
      if (years.length === 0) {
        container.innerHTML = `<div class="empty">Tidak ada data untuk kategori ini.</div>`;
        return;
      }

      container.innerHTML = years.map(year => {
        const rows = grouped[year].map((ev) => {
          const cfg   = kategoriConfig[ev.kategori] || { color: "#888", iconKey: "alert", bg: "#f0f0f0" };
          const color = cfg.color;

          const sumberLinks = ev.sumber.map(s => `
            <a class="sumber-link" href="${esc(s.url)}" target="_blank" rel="noopener noreferrer"
               style="color:${color}" data-stop>
              <span class="sumber-link-icon">${icon("link", color)}</span>
              <span class="sumber-label-text">${esc(s.label)}<span class="sumber-domain"> — ${esc(getDomain(s.url))}</span></span>
              <span class="sumber-arrow">${icon("arrowup", color)}</span>
            </a>`).join("");

          return `
            <div class="event-row">
              <div class="event-spacer"></div>
              <div class="event-dot-col">
                <div class="event-dot" style="background:${color}; box-shadow:0 0 0 2px ${color}"></div>
              </div>
              <div class="event-card"
                   style="background:${cfg.bg}; border-color:${color}; color:#2c2416"
                   role="button" tabindex="0" aria-expanded="false">
                <div class="card-head">
                  <div>
                    <div class="card-kategori" style="color:${color}">${esc(ev.kategori)}</div>
                    <div class="card-title">${esc(ev.peristiwa)}</div>
                    <div class="card-lokasi">
                      ${icon("mappin", "#2c2416")}
                      ${esc(ev.lokasi)}
                    </div>
                  </div>
                  <div class="card-icon" style="color:${color}">${icon(cfg.iconKey, color)}</div>
                </div>
                <div class="card-toggle-hint">
                  ${icon("chevdown", "#2c2416")}
                  Klik untuk detail &amp; sumber
                </div>
                <div class="card-body">
                  <div class="card-desc">${esc(ev.keterangan)}</div>
                  <div class="sumber-label">
                    ${icon("book", "#2c2416")}
                    Sumber
                  </div>
                  <div class="sumber-list">${sumberLinks}</div>
                </div>
              </div>
            </div>`;
        }).join("");

        return `
          <div class="year-group">
            <div class="year-marker"><span class="year-pill">${year}</span></div>
            <div class="events-in-year">${rows}</div>
          </div>`;
      }).join("");

      container.querySelectorAll(".event-card").forEach(card => {
        card.addEventListener("click", e => {
          if (e.target.closest("[data-stop]")) return;
          card.classList.toggle("open");
          card.setAttribute("aria-expanded", card.classList.contains("open"));
        });
        card.addEventListener("keydown", e => {
          if (e.key === "Enter") card.click();
        });
      });
    }

    /* ── Legend ── */
    function renderLegend() {
      document.getElementById("legend").innerHTML =
        Object.entries(kategoriConfig).map(([k, cfg]) => `
          <div class="legend-item" style="color:${cfg.color}">
            ${icon(cfg.iconKey, cfg.color)}
            <span>${esc(k)}</span>
          </div>`).join("");
    }

    renderStats();
    renderFilters();
    renderTimeline();
    renderLegend();
  </script>
</body>
</html>
